version: "3.8"

services:
  user-service:
    build: ./user-service
    ports:
      - "4000:3000"
    networks:
      - micro-net

  product-service:
    build: ./product-service
    ports:
      - "4001:3001"
    networks:
      - micro-net

  order-service:
    build: ./order-service
    ports:
      - "4002:3002"
    networks:
      - micro-net

  gateway-service:
    build: ./gateway-service
    ports:
      - "4003:3003"
    depends_on:
      - user-service
      - product-service
      - order-service
    networks:
      - micro-net

networks:
  micro-net:
    driver: bridge